# Local stack: copy .env.example → .env, then: docker compose up --build
services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Optional: PubMed-tuned embeddings (larger download than MiniLM).
      # BIOTARGET_EMBEDDING_MODEL: "pritamdeka/S-PubMedBert-MS-MARCO"
      LOG_LEVEL: INFO
